# Cloud Build pipeline: build image -> push to Artifact Registry -> deploy to Cloud Run.
#
# Two ways to invoke:
#   1. Manual: `gcloud builds submit --config cloudbuild.yaml .`
#      Tags the image as `:latest` and `:manual-<BUILD_ID>`.
#   2. Trigger on push to main (see scripts/setup-trigger.sh)
#      Override `_TAG` to `$SHORT_SHA` in the trigger config to pin per-commit
#      tags, or leave it as `:latest` for rolling deploys.

substitutions:
  _REGION: us-central1
  _SERVICE: hackathon-io
  _REPO: hackathon-io
  _TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:build-${BUILD_ID}
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:build-${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --concurrency=80
      - --min-instances=1
      - --max-instances=5
      - --cpu=2
      - --memory=2Gi
      - --timeout=3600
      - --no-cpu-throttling
      # `--update-env-vars` (vs `--set-env-vars`) is additive: it only
      # touches the listed keys and preserves anything set out-of-band
      # — e.g. YT_DLP_COOKIES + the /secrets/cookies.txt mount applied
      # via `gcloud run services update --update-secrets`.
      - --update-env-vars=LOCAL_MODE=false,GEMINI_MODEL=gemini-flash-latest,GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_LOCATION=${_REGION}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:build-${BUILD_ID}

options:
  logging: CLOUD_LOGGING_ONLY
