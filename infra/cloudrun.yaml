apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hackathon-io
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 3600
      containers:
        - image: gcr.io/PROJECT_ID/hackathon-io:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
          env:
            - name: LOCAL_MODE
              value: "false"
            - name: GEMINI_MODEL
              value: "gemini-flash-latest"
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
